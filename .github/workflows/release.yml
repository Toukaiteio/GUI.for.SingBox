name: Build GUI.for.SingBox

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  Prepare-Release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Using pushed tag ${tag}"
            exit 0
          fi

          version="$(sed -nE 's/.*AppVersion:[[:space:]]*"([^"]+)".*/\1/p' bridge/bridge.go | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "Unable to read AppVersion from bridge/bridge.go" >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "AppVersion '${version}' is not a release tag version" >&2
            exit 1
          fi

          echo "release_tag=${version}" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Tag ${version} already exists; release build is skipped."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "${version}" "${GITHUB_SHA}"
          git push origin "refs/tags/${version}"
          echo "Created tag ${version} for ${GITHUB_SHA}."
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  Build-Frontend:
    needs: Prepare-Release
    if: needs.Prepare-Release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build-only
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

  Build-Windows:
    needs: [Prepare-Release, Build-Frontend]
    if: needs.Prepare-Release.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      APP_NAME: GUI.for.SingBox
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build & Pack Windows
        shell: pwsh
        run: |
          function Build-And-Pack {
            param([string]$arch)
            $env:GOOS="windows"
            $env:GOARCH=$arch

            Write-Host "==> Building Windows $arch..."
            ~/go/bin/wails build -m -s -trimpath -skipbindings -devtools -o "$env:APP_NAME.exe"

            cd build/bin
            $zipName = "$env:APP_NAME-windows-$arch.zip"
            Compress-Archive -Path "$env:APP_NAME.exe" -DestinationPath $zipName -Force
            cd ../..
          }

          $arches = @("amd64","arm64","386")
          foreach ($arch in $arches) { Build-And-Pack $arch }

      - uses: actions/upload-artifact@v6
        with:
          name: windows-builds
          path: build/bin/*.zip

  Build-macOS:
    needs: [Prepare-Release, Build-Frontend]
    if: needs.Prepare-Release.outputs.should_release == 'true'
    runs-on: macos-latest
    env:
      APP_NAME: GUI.for.SingBox
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - run: |
          go mod vendor
          sed -i "" "s/\[NSApp setActivationPolicy:NSApplicationActivationPolicyRegular\]/[NSApp setActivationPolicy:NSApplicationActivationPolicyAccessory]/g" vendor/github.com/wailsapp/wails/v2/internal/frontend/desktop/darwin/AppDelegate.m

      - name: Build & Pack macOS
        run: |
          build_and_pack() {
            arch=$1
            export GOOS=darwin GOARCH=$arch

            echo "==> Building macOS $arch..."
            ~/go/bin/wails build -m -s -trimpath -skipbindings -devtools -o $APP_NAME.exe

            cd build/bin
            zip -q -r $APP_NAME-darwin-$arch.zip $APP_NAME.app
            cd ../..
          }

          for arch in amd64 arm64; do build_and_pack $arch; done

      - uses: actions/upload-artifact@v6
        with:
          name: macos-builds
          path: build/bin/*.zip

  Build-Linux:
    needs: [Prepare-Release, Build-Frontend]
    if: needs.Prepare-Release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      APP_NAME: GUI.for.SingBox
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist
      - run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            gcc-aarch64-linux-gnu \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Build & Pack Linux
        run: |
          build_and_pack() {
            arch=$1
            export GOOS=linux GOARCH=$arch CGO_ENABLED=1

            if [ "$arch" = "arm64" ]; then
              export CC=aarch64-linux-gnu-gcc
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
            fi

            echo "==> Building Linux $arch..."
            ~/go/bin/wails build -m -s -trimpath -skipbindings -devtools -tags webkit2_41 -o $APP_NAME.exe

            cd build/bin
            mv $APP_NAME.exe $APP_NAME
            zip $APP_NAME-linux-$arch.zip $APP_NAME
            cd ../..
          }

          for arch in amd64 arm64; do build_and_pack $arch; done

      - uses: actions/upload-artifact@v6
        with:
          name: linux-builds
          path: build/bin/*.zip

  Release:
    needs: [Prepare-Release, Build-Windows, Build-macOS, Build-Linux]
    if: needs.Prepare-Release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.Prepare-Release.outputs.release_tag }}
          name: ${{ needs.Prepare-Release.outputs.release_tag }}
          files: release-assets/**/*.zip
          draft: false
          prerelease: ${{ contains(needs.Prepare-Release.outputs.release_tag, 'dev') }}
          body: |
            Auto-generated release from GitHub Actions.
